name: Build Executables (Windows + macOS)

on:
  push:
    branches: [main, master]
    paths:
      - 'nas_migrate_gui.py'
      - '.github/workflows/build-executables.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: ShinigamiEyes-Windows
            artifact_path: dist/Shinigami Eyes.exe
          - os: macos-latest
            platform: macos
            artifact_name: ShinigamiEyes-macOS
            artifact_path: dist/Shinigami Eyes-macOS.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (Windows)
        if: matrix.platform == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Python with tkinter (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install python-tk@3.12
          echo "$(brew --prefix python-tk@3.12)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix python@3.12)/bin" >> $GITHUB_PATH

      - name: Install PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: pip install pyinstaller

      - name: Install PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: pip3 install --break-system-packages pyinstaller

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: pyinstaller --onefile --windowed --name "Shinigami Eyes" nas_migrate_gui.py

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: pyinstaller --windowed --name "Shinigami Eyes" nas_migrate_gui.py

      - name: Zip macOS app bundle
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Shinigami Eyes.app" "Shinigami Eyes-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows exe
        run: cp "artifacts/ShinigamiEyes-Windows/Shinigami Eyes.exe" "./Shinigami Eyes-Windows.exe"

      - name: Package macOS zip
        run: cp "artifacts/ShinigamiEyes-macOS/Shinigami Eyes-macOS.zip" "./Shinigami Eyes-macOS.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Shinigami Eyes-Windows.exe
            Shinigami Eyes-macOS.zip

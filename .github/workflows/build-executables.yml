name: Build Executables (Windows + macOS)

on:
  push:
    branches: [main, master]
    paths:
      - 'nas_migrate_gui.py'
      - 'shinigami_eyes_logo.png'
      - 'shinigami_eyes.ico'
      - 'shinigami_eyes.icns'
      - '.github/workflows/build-executables.yml'
  # NOT `push: tags:` — a `paths` filter applies to every push event
  # including tag pushes, and tag pushes don't match it, so tag-triggered
  # runs were silently skipped (v3.1.0 released with no binaries). Trigger
  # on release publication instead: github.ref is the tag ref
  # (refs/tags/vX.Y.Z), so the release job's startsWith check still works.
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    # id-token: write is required for the Windows leg's OIDC login to Azure
    # (Azure Artifact Signing). contents: read must be listed explicitly too —
    # once any permission is set, GitHub stops granting the defaults.
    permissions:
      id-token: write
      contents: read
    # Pinning the OIDC subject to a GitHub Environment (rather than a branch
    # or tag ref) keeps it stable across every trigger this workflow has —
    # branch pushes, tag pushes, and workflow_dispatch all produce the same
    # subject (repo:OWNER/REPO:environment:production), so one Entra
    # federated credential covers all of them. A per-ref credential would
    # only match one exact branch or tag name.
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: ShinigamiEyes-Windows
            artifact_path: dist/Shinigami Eyes.exe
          - os: macos-latest
            platform: macos
            artifact_name: ShinigamiEyes-macOS
            artifact_path: dist/Shinigami Eyes-macOS.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (Windows)
        if: matrix.platform == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Python with tkinter (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install python-tk@3.12
          echo "$(brew --prefix python-tk@3.12)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix python@3.12)/bin" >> $GITHUB_PATH
          # Fail fast if the brew python can't import tkinter — a frozen app
          # built without Tk dies silently on double-click for end users.
          python3.12 -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"

      - name: Install PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: pip install pyinstaller

      # Pinned to python3.12 explicitly: bare `pip3`/`pyinstaller` can resolve
      # to a different Python on the runner (system 3.13 without Tk), which
      # produced a frozen app missing the tkinter module entirely.
      - name: Install PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: python3.12 -m pip install --break-system-packages pyinstaller

      # --add-data bundles the logo PNG next to the frozen executable so
      # resource_path() (which checks sys._MEIPASS at runtime) can find it.
      # The SRC/DEST separator is platform-specific: ';' on Windows, ':'
      # everywhere else, because ':' collides with Windows drive letters.
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: pyinstaller --onefile --windowed --name "Shinigami Eyes" --icon shinigami_eyes.ico --add-data "shinigami_eyes_logo.png;." nas_migrate_gui.py

      # Code-signs dist\Shinigami Eyes.exe via Azure Artifact Signing (formerly
      # Trusted Signing). Requires a one-time Azure setup (signing account +
      # certificate profile + an App Registration with a federated credential
      # for OIDC) — see the repo README for the full checklist.
      - name: Azure login (Windows signing)
        if: matrix.platform == 'windows'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows exe with Azure Artifact Signing
        if: matrix.platform == 'windows'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\dist\Shinigami Eyes.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          python3.12 -m PyInstaller --windowed --name "Shinigami Eyes" --icon shinigami_eyes.icns --add-data "shinigami_eyes_logo.png:." nas_migrate_gui.py
          # Smoke tests on the frozen binary. A --windowed PyInstaller app
          # fails silently on double-click, so catch launch crashes here
          # instead of after release:
          #   --selfcheck: imports (caught missing tkinter in v3.1.0)
          #   --uicheck:   full UI construction (caught TclError in v3.1.1)
          "dist/Shinigami Eyes.app/Contents/MacOS/Shinigami Eyes" --selfcheck
          "dist/Shinigami Eyes.app/Contents/MacOS/Shinigami Eyes" --uicheck

      # Imports the Developer ID Application certificate into a throwaway
      # keychain that only exists for this job — the runner VM is destroyed
      # after the job finishes, so a fixed keychain password is fine here.
      - name: Import Developer ID certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      # --options runtime enables the hardened runtime, required for
      # notarization. --deep re-signs every nested binary PyInstaller
      # bundled (Python framework, dylibs, etc.), not just the top-level app.
      - name: Code sign app bundle
        if: matrix.platform == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --deep --force --verbose --timestamp \
            --options runtime \
            --entitlements entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "dist/Shinigami Eyes.app"
          codesign --verify --deep --strict --verbose=2 "dist/Shinigami Eyes.app"

      # Apple only notarizes zip/dmg/pkg submissions, not a raw .app — so this
      # zip is just for the upload, separate from the final distributable dmg
      # below (which is built from the .app *after* stapling).
      - name: Notarize app
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Shinigami Eyes.app" "notarize-submission.zip"
          xcrun notarytool submit "notarize-submission.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "Shinigami Eyes.app"
          rm notarize-submission.zip

      # DMG with an /Applications symlink — the standard macOS install UX:
      # open the dmg, drag the app onto the Applications shortcut. The dmg
      # itself is signed, notarized, and stapled so Gatekeeper accepts it
      # without any "verifying" delay even before the app inside is checked.
      - name: Create DMG (macOS)
        if: matrix.platform == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd dist
          mkdir dmg-staging
          cp -R "Shinigami Eyes.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Shinigami Eyes" -srcfolder dmg-staging \
            -ov -format UDZO "Shinigami Eyes-macOS.dmg"
          rm -rf dmg-staging
          codesign --force --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "Shinigami Eyes-macOS.dmg"
          xcrun notarytool submit "Shinigami Eyes-macOS.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "Shinigami Eyes-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  release:
    needs: build
    # Any published release qualifies — v3.3 was once tagged without the 'v'
    # prefix and the old startsWith(refs/tags/v) check silently skipped this
    # job, shipping a release with no binaries. The ref check remains only
    # for workflow_dispatch runs launched from a tag.
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows exe
        run: cp "artifacts/ShinigamiEyes-Windows/Shinigami Eyes.exe" "./Shinigami Eyes-Windows.exe"

      - name: Package macOS dmg
        run: cp "artifacts/ShinigamiEyes-macOS/Shinigami Eyes-macOS.dmg" "./Shinigami Eyes-macOS.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Shinigami Eyes-Windows.exe
            Shinigami Eyes-macOS.dmg
